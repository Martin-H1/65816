#------------------------------------------------------------------------------
# forth.cfg - ca65 Linker Configuration for 65816 Forth SBC
#
# Memory layout:
#   $0000-$007F   Zero Page / Direct Page (Forth VM registers, scratch)
#   $0080-$00FF   Zero Page (remaining, available)
#   $0100-$01FF   Hardware Stack (Return Stack)
#   $0200-$03FF   Parameter Stack (grows downward from $03FF)
#   $0400-$04FF   User Area
#   $0500-$05FF   Terminal Input Buffer (TIB)
#   $0600-$7EFF   RAM Dictionary (user definitions grow upward)
#   $7F00-$7FFF   I/O space (UART etc.)
#   $8000-$FFBF   ROM (Forth kernel)
#   $FFE0-$FFFF   ROM (65816 hardware vectors)
#------------------------------------------------------------------------------

MEMORY {
    #------------------------------------------------------------------
    # RAM regions
    #------------------------------------------------------------------
    ZP:       start = $0000, size = $0080, type = rw;
    STACK:    start = $0100, size = $0100, type = rw;
    PSTACK:   start = $0200, size = $0200, type = rw;
    USERAREA: start = $0400, size = $0100, type = rw;
    TIB:      start = $0500, size = $0100, type = rw;
    DICT:     start = $0600, size = $78FF, type = rw;

    #------------------------------------------------------------------
    # ROM regions
    #------------------------------------------------------------------
    ROM:      start = $8000, size = $7FDF, type = ro, fill = yes, fillval = $FF;
    VECTORS:  start = $FFE0, size = $0020, type = ro, fill = yes, fillval = $FF;
}

SEGMENTS {
    #------------------------------------------------------------------
    # RAM segments
    #------------------------------------------------------------------
    ZEROPAGE: load = ZP,       type = zp,  define = yes;
    BSS:      load = DICT,     type = bss, define = yes, start = $0600;

    #------------------------------------------------------------------
    # ROM segments
    #------------------------------------------------------------------
    CODE:     load = ROM,      type = ro,  define = yes, align=$100;
    RODATA:   load = ROM,      type = ro;
    VECTORS:  load = VECTORS,  type = ro;
}
