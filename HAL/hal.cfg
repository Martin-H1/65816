# =============================================================================
# hal.cfg — ld65 linker configuration for W65C265S HAL
#
# Target: 32K EEPROM mapped at $00:8000–$00:FFFF (bank 0)
#
# Boot flow:
#   The W65C265S masked ROM checks for "WDC" signature at $8000–$8002.
#   If found it does JMP $8004, entering our HAL with:
#     native mode, A=8-bit, X/Y=16-bit, I=1, D=0, SP=$01FF
#   The internal masked ROM remains mapped until BCR bit 7 is set.
#   Our EEPROM vectors at $FF80–$FFFF are therefore hidden until then.
#
# Memory map summary:
#   $0000–$000F   HAL zero page variables         (RAM)
#   $0100–$01FF   65816 hardware stack            (RAM, CPU-defined)
#   $0200–$02FF   HAL private page                (RAM, ext. SRAM)
#   $0300–$7FFF   Program RAM                     (RAM, ext. SRAM)
#   $8000–$8003   WDC boot signature + padding    (EEPROM)
#   $8004–$BFFF   HAL implementation code         (EEPROM)
#   $C000–$DEEF   HAL code continued / Forth      (EEPROM)
#   $DF00–$DFFF   SFRs                            (not in EEPROM image)
#   $E000–$FEFF   HAL code / Forth continued      (EEPROM)
#   $FF00–$FF5F   HAL jump table                  (EEPROM, fixed addresses)
#   $FF60–$FF7F   Reserved (SD card API slots)    (EEPROM)
#   $FF80–$FFBF   Native mode vector table        (EEPROM, W65C265S layout)
#   $FFC0–$FFFF   Emulation mode vector table     (EEPROM, W65C265S layout)
#
# The EEPROM image is 32768 bytes ($8000–$FFFF).
# ld65 produces a flat binary; offset 0 in the binary = address $8000.
# =============================================================================

MEMORY {
    # ------------------------------------------------------------------
    # RAM regions — no bytes emitted into the output binary.
    # ------------------------------------------------------------------

    ZP:         start = $0000, size = $0010, type = rw, file = "";
                # HAL zero page: $00–$0F (16 bytes)
                # Programs may use $10–$FF freely

    STACK:      start = $0100, size = $0100, type = rw, file = "";
                # 65816 hardware stack — reserved, no segments placed here

    HAL_PAGE2:  start = $0200, size = $0100, type = rw, file = "";
                # HAL private page: callback vectors, RX/TX ring buffers,
                # VIA shadow regs. Lives in external SRAM.

    # ------------------------------------------------------------------
    # EEPROM regions — all emit bytes into the output binary.
    # ------------------------------------------------------------------

    SIGNATURE:  start = $8000, size = $0004, type = ro,
                file = %O, fill = yes, fillval = $FF;
                # $8000–$8003: "WDC\0" boot signature checked by masked ROM.
                # Masked ROM does JMP $8004 if signature matches.

    HAL_LO:     start = $8004, size = $3BEC, type = ro,
                file = %O, fill = yes, fillval = $FF;
                # $8004–$BBEF: HAL entry point and implementation.
                # hal_reset is placed at $8004 by hal_header.asm.

    HAL_MID:    start = $BC00, size = $02F0, type = ro,
                file = %O, fill = yes, fillval = $FF;
                # $BC00–$BEEF: HAL continued / Forth kernel lower region.

    HAL_HI2:    start = $BF00, size = $0100, type = ro,
                file = %O, fill = yes, fillval = $FF;
                # $BF00–$BFFF: HAL / Forth continued.

    HAL_C:      start = $C000, size = $1EF0, type = ro,
                file = %O, fill = yes, fillval = $FF;
                # $C000–$DEEF: HAL code / Forth continued.
                # Stops before SFR window at $DF00.

    # $DF00–$DFFF: SFR window — no EEPROM region here.

    HAL_HI:     start = $E000, size = $0F00, type = ro,
                file = %O, fill = yes, fillval = $FF;
                # $E000–$FEFF: HAL implementation upper half.

    JUMPTABLE:  start = $FF00, size = $0060, type = ro,
                file = %O, fill = yes, fillval = $FF;
                # $FF00–$FF5F: fixed jump table (16 entries × 3 bytes).

    RESERVED:   start = $FF60, size = $0020, type = ro,
                file = %O, fill = yes, fillval = $FF;
                # $FF60–$FF7F: reserved for SD card API slots.

    NATIVE_VECS: start = $FF80, size = $0040, type = ro,
                 file = %O, fill = yes, fillval = $FF;
                # $FF80–$FFBF: W65C265S native mode vector table.

    EMUL_VECS:  start = $FFC0, size = $0040, type = ro,
                file = %O, fill = yes, fillval = $FF;
                # $FFC0–$FFFF: W65C265S emulation mode vector table.
}

SEGMENTS {
    # ------------------------------------------------------------------
    # RAM segments (no bytes emitted)
    # ------------------------------------------------------------------

    ZEROPAGE:   load = ZP,        type = zp;
    BSS_PAGE2:  load = HAL_PAGE2, type = bss;

    # ------------------------------------------------------------------
    # EEPROM segments
    # ------------------------------------------------------------------

    HAL_SIG:    load = SIGNATURE, type = ro;
                # "WDC\0" signature — placed by hal_header.asm

    HAL_CODE:   load = HAL_LO,   type = ro;
                # Main HAL implementation. hal_reset entry at $8004.
                # Linker overflows into HAL_MID, HAL_HI2, HAL_C, HAL_HI
                # automatically as each region fills.

    HAL_CODE2:  load = HAL_HI,   type = ro, optional = yes;
                # Explicit overflow into $E000–$FEFF if needed.

    RODATA:     load = HAL_LO,   type = ro, optional = yes;
                # Read-only data tables (baud table, cop_table, etc.).

    JUMPTAB:    load = JUMPTABLE, type = ro;
                # Fixed-address jump table at $FF00.

    RESERVED_SD: load = RESERVED, type = ro, optional = yes;
                # Future SD card jump table slots.

    NATIVE_VECTORS:  load = NATIVE_VECS, type = ro;
    EMUL_VECTORS:    load = EMUL_VECS,   type = ro;
}
