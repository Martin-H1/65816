# =============================================================================
# hal.cfg — ld65 linker configuration for W65C265S HAL
#
# Target: 32K EEPROM mapped at $00:8000–$00:FFFF (bank 0)
#
# Memory map summary:
#   $0000–$000F   HAL zero page variables         (RAM, defined here for ZP segs)
#   $0100–$01FF   65816 hardware stack            (RAM, CPU-defined, not in script)
#   $0200–$02FF   HAL private page                (RAM, ext. SRAM)
#   $0300–$7FFF   Program RAM                     (RAM, ext. SRAM — not claimed)
#   $8000–$BFFF   ITC Forth kernel slot           (EEPROM — Forth fills this)
#   $C000–$DEEF   HAL implementation code         (EEPROM)
#   $DF00–$DFFF   SFRs                            (not in EEPROM image)
#   $E000–$FEFF   HAL implementation continued    (EEPROM)
#   $FF00–$FF5F   HAL jump table                  (EEPROM, fixed addresses)
#   $FF60–$FF7F   Reserved (SD card API slots)    (EEPROM)
#   $FF80–$FFBF   Native mode vector table        (EEPROM, W65C265S layout)
#   $FFC0–$FFFF   Emulation mode vector table     (EEPROM, W65C265S layout)
#
# The EEPROM image is 32768 bytes ($8000–$FFFF).
# ld65 produces a flat binary; offset 0 in the binary = address $8000.
# =============================================================================

MEMORY {
    # ------------------------------------------------------------------
    # RAM regions — used only to place ZP and page-two segments at the
    # correct addresses. No bytes are emitted into the output binary for
    # these; they carry "file = """ to suppress output.
    # ------------------------------------------------------------------

    ZP:     start = $0000, size = $0010, type = rw, file = "";
            # HAL zero page: $00–$0F (16 bytes)
            # Programs may use $10–$FF freely

    STACK:  start = $0100, size = $0100, type = rw, file = "";
            # 65816 hardware stack — reserved, no segments placed here

    HAL_PAGE2: start = $0200, size = $0100, type = rw, file = "";
            # HAL private page: callback vectors, RX/TX ring buffers,
            # VIA shadow regs. Lives in external SRAM.

    # ------------------------------------------------------------------
    # EEPROM regions — all emit bytes into the output binary.
    # The binary starts at load address $8000 (offset 0).
    # ------------------------------------------------------------------

    FORTH_SLOT: start = $8000, size = $4000, type = ro,
                file = %O, fill = yes, fillval = $FF;
            # $8000–$BFFF: ITC Forth kernel.
            # Filled with $FF (erased EEPROM value) when Forth is absent.
            # The boot probe checks for signature "FTH\0" at $8000.

    HAL_LO: start = $C000, size = $1EF0, type = ro,
            file = %O, fill = yes, fillval = $FF;
            # $C000–$DEEF: HAL implementation, lower half.
            # Stops before the SFR window at $DF00.

    # $DF00–$DFFF is the SFR window — no EEPROM region here.
    # The linker skips it; the binary has a gap filled by the programmer.
    # To keep the binary contiguous, HAL_HI starts where SFRs end.

    HAL_HI: start = $E000, size = $0F00, type = ro,
            file = %O, fill = yes, fillval = $FF;
            # $E000–$FEFF: HAL implementation, upper half.

    JUMPTABLE: start = $FF00, size = $0060, type = ro,
               file = %O, fill = yes, fillval = $FF;
            # $FF00–$FF5F: fixed jump table (16 entries × 3 bytes each = 48 bytes
            # used; 12 bytes padding to $FF5F boundary).

    RESERVED: start = $FF60, size = $0020, type = ro,
              file = %O, fill = yes, fillval = $FF;
            # $FF60–$FF7F: reserved for SD card API slots (4 entries pre-planned).

    NATIVE_VECS: start = $FF80, size = $0040, type = ro,
                 file = %O, fill = yes, fillval = $FF;
            # $FF80–$FFBF: W65C265S native mode vector table (32 vectors × 2 bytes).

    EMUL_VECS: start = $FFC0, size = $0040, type = ro,
               file = %O, fill = yes, fillval = $FF;
            # $FFC0–$FFFF: W65C265S emulation mode vector table.
}

SEGMENTS {
    # ------------------------------------------------------------------
    # RAM segments (no bytes emitted)
    # ------------------------------------------------------------------

    ZEROPAGE:   load = ZP,        type = zp;
            # ca65 zero-page variables (.segment "ZEROPAGE")

    BSS_PAGE2:  load = HAL_PAGE2, type = bss;
            # HAL page-two variables (.segment "BSS_PAGE2")
            # Initialised to zero by hal_init at boot.

    # ------------------------------------------------------------------
    # EEPROM segments
    # ------------------------------------------------------------------

    FORTH_HDR:  load = FORTH_SLOT, type = ro, optional = yes;
            # Optional: Forth kernel image header/body.
            # When absent, FORTH_SLOT fills with $FF and boot probe
            # finds no signature — falls through to HAL prompt.

    HAL_CODE:   load = HAL_LO,    type = ro;
            # Main HAL implementation code (lower half).
            # Placed first; linker continues into HAL_HI automatically
            # when HAL_LO fills. Use .segment "HAL_CODE" in source.

    HAL_CODE2:  load = HAL_HI,    type = ro, optional = yes;
            # Overflow segment for HAL code that spills past $DEFF.
            # Use .segment "HAL_CODE2" explicitly for routines that
            # must live in $E000–$FEFF.

    RODATA:     load = HAL_LO,    type = ro, optional = yes;
            # Read-only data tables (baud divisor table, etc.).
            # Shares HAL_LO region with HAL_CODE.

    JUMPTAB:    load = JUMPTABLE, type = ro;
            # Fixed-address jump table. Every entry MUST assemble to
            # exactly 3 bytes (JMP abs) or 6 bytes (JMP + NOP NOP).
            # Use .segment "JUMPTAB" in hal_jumptable.asm.

    RESERVED_SD: load = RESERVED, type = ro, optional = yes;
            # Placeholder for future SD card jump table entries.

    NATIVE_VECTORS:  load = NATIVE_VECS, type = ro;
            # Native mode vector table (.segment "NATIVE_VECTORS").
            # 32 two-byte vectors; all point into HAL ISR stubs or
            # the user callback dispatch in HAL_PAGE2.

    EMUL_VECTORS:    load = EMUL_VECS,   type = ro;
            # Emulation mode vector table (.segment "EMUL_VECTORS").
            # RESET vector here points to hal_reset_emul for safety,
            # which immediately switches to native mode.
}

# No FEATURES block needed — default symbol import/export is fine.
